name: release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  package-agent-bar-dmg:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        env:
          WORKFLOW_TAG: ${{ inputs.tag }}
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${WORKFLOW_TAG}"
          fi
          if [ -z "${release_tag}" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"
          echo "RELEASE_VERSION=${release_tag#v}" >> "${GITHUB_ENV}"

      - name: Prepare AgentBar signing config
        env:
          AGENT_BAR_CODESIGN_P12_BASE64: ${{ secrets.AGENT_BAR_CODESIGN_P12_BASE64 }}
          AGENT_BAR_CODESIGN_P12_PASSWORD: ${{ secrets.AGENT_BAR_CODESIGN_P12_PASSWORD }}
          AGENT_BAR_CODESIGN_KEYCHAIN_PASSWORD: ${{ secrets.AGENT_BAR_CODESIGN_KEYCHAIN_PASSWORD }}
          AGENT_BAR_CODESIGN_IDENTITY: ${{ secrets.AGENT_BAR_CODESIGN_IDENTITY }}
        run: |
          echo "AGENT_BAR_CODESIGN_MODE=adhoc" >> "${GITHUB_ENV}"

          if [ -z "${AGENT_BAR_CODESIGN_P12_BASE64}" ] || [ -z "${AGENT_BAR_CODESIGN_P12_PASSWORD}" ]; then
            echo "No AgentBar Developer ID signing certificate configured; release DMG will be ad-hoc signed and notarization will be skipped."
            exit 0
          fi

          keychain_password="${AGENT_BAR_CODESIGN_KEYCHAIN_PASSWORD:-${RUNNER_TEMP}-agent-bar-keychain}"
          cert_path="${RUNNER_TEMP}/agent-bar-signing.p12"
          keychain_path="${RUNNER_TEMP}/agent-bar-signing.keychain-db"

          CERT_PATH="${cert_path}" python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["AGENT_BAR_CODESIGN_P12_BASE64"]))'

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${cert_path}" -k "${keychain_path}" -P "${AGENT_BAR_CODESIGN_P12_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${keychain_password}" "${keychain_path}"

          resolved_identity="${AGENT_BAR_CODESIGN_IDENTITY:-}"
          if [ -z "${resolved_identity}" ]; then
            resolved_identity="$(security find-identity -v -p codesigning "${keychain_path}" | sed -n 's/.*\"\(.*\)\"/\1/p' | head -n 1)"
          fi
          if [ -z "${resolved_identity}" ]; then
            echo "Imported signing certificate, but no usable codesigning identity was found in ${keychain_path}." >&2
            exit 1
          fi

          {
            echo "AGENT_BAR_CODESIGN_MODE=identity"
            echo "AGENT_BAR_CODESIGN_IDENTITY=${resolved_identity}"
            echo "AGENT_BAR_CODESIGN_KEYCHAIN=${keychain_path}"
          } >> "${GITHUB_ENV}"

      - name: Build AgentBar DMG
        run: |
          AGENT_BAR_RELEASE_VERSION="${RELEASE_VERSION}" ./scripts/release-package.sh

      - name: Notarize AgentBar DMG
        env:
          APPLE_NOTARY_API_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
        run: |
          if [ "${AGENT_BAR_CODESIGN_MODE}" != "identity" ]; then
            echo "AgentBar is not Developer ID signed; skipping notarization."
            exit 0
          fi
          if [ -z "${APPLE_NOTARY_API_KEY_P8_BASE64}" ] || [ -z "${APPLE_NOTARY_KEY_ID}" ] || [ -z "${APPLE_NOTARY_ISSUER_ID}" ] || [ -z "${APPLE_DEVELOPER_TEAM_ID}" ]; then
            echo "No notary credentials configured; skipping AgentBar notarization."
            exit 0
          fi

          dmg_path="dist/release/agent-bar/AgentBar-${RELEASE_VERSION}.dmg"
          api_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"

          CERT_PATH="${api_key_path}" python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_NOTARY_API_KEY_P8_BASE64"]))'

          xcrun notarytool submit "${dmg_path}" \
            --key "${api_key_path}" \
            --key-id "${APPLE_NOTARY_KEY_ID}" \
            --issuer "${APPLE_NOTARY_ISSUER_ID}" \
            --team-id "${APPLE_DEVELOPER_TEAM_ID}" \
            --wait

          xcrun stapler staple "${dmg_path}"

      - name: Generate Sparkle appcast
        env:
          AGENT_BAR_SPARKLE_PRIVATE_KEY: ${{ secrets.AGENT_BAR_SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "${AGENT_BAR_SPARKLE_PRIVATE_KEY}" ]; then
            echo "AGENT_BAR_SPARKLE_PRIVATE_KEY is required to generate signed Sparkle appcast.xml." >&2
            exit 1
          fi

          ./scripts/generate-sparkle-appcast.sh \
            --dmg-path "dist/release/agent-bar/AgentBar-${RELEASE_VERSION}.dmg" \
            --version "${RELEASE_VERSION}" \
            --release-tag "${RELEASE_TAG}" \
            --output "dist/release/agent-bar/appcast.xml"

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: agent-bar-release-artifacts
          path: |
            dist/release/agent-bar/AgentBar-*.dmg
            dist/release/agent-bar/appcast.xml
          if-no-files-found: error

      - name: Generate build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/release/agent-bar/AgentBar-${{ env.RELEASE_VERSION }}.dmg

      - name: Publish AgentBar DMG to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dmg_path="dist/release/agent-bar/AgentBar-${RELEASE_VERSION}.dmg"
          appcast_path="dist/release/agent-bar/appcast.xml"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${dmg_path}" "${appcast_path}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${dmg_path}" "${appcast_path}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
